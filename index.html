    const Check = ({size=24,className=""}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="20 6 9 17 4 12"/></svg>;
    const Copy = ({size=24,className=""}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>;
    const Calendar = ({size=24,className=""}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>;

    const BarChartIcon = () => (
      <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" className="text-green-500 drop-shadow-sm">
        <path d="M3 3v18h18"/>
        <path d="M18 17V9"/>
        <path d="M13 17V5"/>
        <path d="M8 17v-3"/>
      </svg>
    );

    // --- 2. ユーティリティ関数とデータ ---
    const parseNum = (str) => {
      if (!str) return 0;
      if (typeof str === 'number') return str;
      const num = parseFloat(String(str).replace(/[^0-9.-]+/g, ""));
      return isNaN(num) ? 0 : num;
    };

    function parseCSV(text) {
      const lines = [];
      let currentLine = [];
      let currentCell = '';
      let inQuotes = false;

      for (let i = 0; i < text.length; i++) {
        const c = text[i];
        if (inQuotes) {
          if (c === '"') {
            if (i + 1 < text.length && text[i + 1] === '"') {
              currentCell += '"';
              i++;
            } else {
              inQuotes = false;
            }
          } else {
            currentCell += c;
          }
        } else {
          if (c === '"') {
            inQuotes = true;
          } else if (c === ',') {
            currentLine.push(currentCell);
            currentCell = '';
          } else if (c === '\n' || c === '\r') {
            currentLine.push(currentCell);
            lines.push(currentLine);
            currentLine = [];
            currentCell = '';
            if (c === '\r' && i + 1 < text.length && text[i + 1] === '\n') {
              i++;
            }
          } else {
            currentCell += c;
          }
        }
      }
      
      if (currentCell || text[text.length - 1] === ',') {
        currentLine.push(currentCell);
      }
      if (currentLine.length > 0) {
        lines.push(currentLine);
      }

      if (lines.length === 0) return [];
      
      const headers = lines[0];
      const data = [];
      
      for (let i = 1; i < lines.length; i++) {
        if (lines[i].length === 1 && lines[i][0] === "") continue;
        const obj = {};
        headers.forEach((header, index) => {
          let val = lines[i][index] || "";
          if (['消化金額', '表示回数', 'クリック数', '応募開始数', '応募数'].includes(header)) {
            obj[header] = parseNum(val);
          } else {
            obj[header] = val;
          }
        });
        data.push(obj);
      }
      return data;
    }

    const CATEGORIES = [
      '事務・オフィス系', '営業職', 'ドライバー・物流・運送', '製造・工場・軽作業',
      '接客・販売・サービス', '飲食関連（調理・食品）', 'イベント・催事・アミューズメント',
      'クリエイティブ・企画・マーケティング', '清掃・警備・管理', '建築・土木・設備',
      '医療・介護・福祉', '専門職・技術職', '教育・保育・指導', 'その他・未分類'
    ];

    const PREFECTURES = [
      '北海道', '青森県', '岩手県', '宮城県', '秋田県', '山形県', '福島県',
      '茨城県', '栃木県', '群馬県', '埼玉県', '千葉県', '東京都', '神奈川県',
      '新潟県', '富山県', '石川県', '福井県', '山梨県', '長野県', '岐阜県',
      '静岡県', '愛知県', '三重県', '滋賀県', '京都府', '大阪府', '兵庫県',
      '奈良県', '和歌山県', '鳥取県', '島根県', '岡山県', '広島県', '山口県',
      '徳島県', '香川県', '愛媛県', '高知県', '福岡県', '佐賀県', '長崎県',
      '熊本県', '大分県', '宮崎県', '鹿児島県', '沖縄県'
    ];

    const KEYWORD_STYLE = { width: '200px', minWidth: '200px', maxWidth: '200px' };
    const PREF_STYLE = { width: '140px', minWidth: '140px', maxWidth: '140px' };
    const STAT_STYLE = { width: '140px', minWidth: '140px', maxWidth: '140px' };

    const CACHE_KEY = 'indeed_plus_csv_data';

    // --- 3. メインのアプリケーションコンポーネント ---
    function App() {
      const [data, setData] = useState([]);
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState(null);
      
      const [freeWordInput, setFreeWordInput] = useState('');
      const [locationInput, setLocationInput] = useState('');

      const [freeWord, setFreeWord] = useState('');
      const [location, setLocation] = useState('');

      const [categoryFilter, setCategoryFilter] = useState('');
      const [campaignFilter, setCampaignFilter] = useState('all');
      const [comparisonMode, setComparisonMode] = useState('job');
      const [searchMode, setSearchMode] = useState('OR');

      const [isColumnDropdownOpen, setIsColumnDropdownOpen] = useState(false);
      const [visibleColumns, setVisibleColumns] = useState(['count', 'cost', 'clicks', 'applies', 'cvr', 'cpc', 'cpa']);
      
      const [isCopied, setIsCopied] = useState(false);
      const [showOnlyCpa, setShowOnlyCpa] = useState(false);

      const [selectedJobTitles, setSelectedJobTitles] = useState([]);

      const [periodFrom, setPeriodFrom] = useState('');
      const [periodTo, setPeriodTo] = useState('');
      const [includeUnknown, setIncludeUnknown] = useState(true);

      const [comparePeriodAFrom, setComparePeriodAFrom] = useState('');
      const [comparePeriodATo, setComparePeriodATo] = useState('');
      const [comparePeriodBFrom, setComparePeriodBFrom] = useState('');
      const [comparePeriodBTo, setComparePeriodBTo] = useState('');

      // ▼ 削除：適用待機用の appliedFilters ステートを削除しました

      const dropdownRef = useRef(null);
      
      const headerScrollRef = useRef(null);
      const bodyScrollRef = useRef(null);
      const dummyScrollRef = useRef(null);

      const handleScroll = (e) => {
        const scrollLeft = e.target.scrollLeft;
        if (headerScrollRef.current && headerScrollRef.current !== e.target) {
          headerScrollRef.current.scrollLeft = scrollLeft;
        }
        if (bodyScrollRef.current && bodyScrollRef.current !== e.target) {
          bodyScrollRef.current.scrollLeft = scrollLeft;
        }
        if (dummyScrollRef.current && dummyScrollRef.current !== e.target) {
          dummyScrollRef.current.scrollLeft = scrollLeft;
        }
      };

      useEffect(() => {
        const handleClickOutside = (event) => {
          if (dropdownRef.current && !dropdownRef.current.contains(event.target)) {
            setIsColumnDropdownOpen(false);
          }
        };
        document.addEventListener('mousedown', handleClickOutside);
        return () => {
          document.removeEventListener('mousedown', handleClickOutside);
        };
      }, []);

      useEffect(() => {
        const timer = setTimeout(() => {
          setFreeWord(freeWordInput);
          setLocation(locationInput);
        }, 500);
        return () => clearTimeout(timer);
      }, [freeWordInput, locationInput]);

      const isCalculating = freeWordInput !== freeWord || locationInput !== location;

      useEffect(() => {
        setSelectedJobTitles([]);
      }, [freeWord]);

      // ▼ 削除：hasUnappliedChanges や handleApplyFilters を削除しました

      useEffect(() => {
        const fetchData = async () => {
          let cachedText = null;
          
          try {
            cachedText = window.localStorage.getItem(CACHE_KEY);
            if (cachedText) {
              const parsedData = parseCSV(cachedText);
              setData(parsedData);
              setLoading(false);
            }
          } catch (e) {
            console.warn("キャッシュの読み込みに失敗しました:", e);
          }

          try {
            let response;
            try {
              // ▼ まずは同階層のCSVファイル（相対パス）からの取得を試みる
              response = await fetch('./data.csv');
              if (!response.ok) throw new Error('Local file not found');
            } catch (e) {
              // ▼ プレビュー環境など相対パスが無効な場合や、ファイルが見つからない場合は、
              // フォールバックとして元のGoogleスプレッドシートからデータを取得する
              console.warn("ローカルの data.csv が見つからないか、プレビュー環境のためフォールバックURLを使用します。");
              const fallbackUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSiVeQSkfiHCujV6SG1q5UQwyMAxnEDVaUD8mwdPK8q3rXCsh_XDIR9fYwHmhknfrv_a3mxebwH28HB/pub?gid=0&single=true&output=csv';
              response = await fetch(fallbackUrl);
            }
            
            if (!response.ok) {
              throw new Error('ネットワークエラーにより最新データの取得に失敗しました。');
            }
            
            const csvText = await response.text();
            
            if (cachedText === csvText) {
              return; 
            }
            
            try {
              window.localStorage.setItem(CACHE_KEY, csvText);
            } catch (e) {
              console.warn("キャッシュの保存に失敗しました:", e);
            }

            const parsedData = parseCSV(csvText);
            setData(parsedData);
            setLoading(false);
            setError(null);
            
          } catch (err) {
            if (!cachedText) {
              setError(err.message);
              setLoading(false);
            }
            console.error('Fetch error:', err);
          }
        };

        fetchData();
      }, []);

      const splitKeywords = (text) => {
        if (!text) return [];
        return text.split(/[\s　]+/).filter(k => k.length > 0);
      };

      const renderSearchConditions = (text, mode, colorTheme = 'sky', fallback = '（指定なし）') => {
        const keywords = splitKeywords(text);
        if (keywords.length === 0) return fallback;
        if (keywords.length === 1) return text; 
        
        const getBadgeStyle = () => {
          if (mode === 'OR') return 'bg-orange-200 text-orange-800';
          if (colorTheme === 'emerald') return 'bg-emerald-200/80 text-emerald-800';
          if (colorTheme === 'stone') return 'bg-stone-200 text-stone-600';
          return 'bg-sky-200/80 text-sky-800';
        };

        return (
          <span className="inline-flex items-center gap-1 align-middle max-w-full">
            {keywords.map((kw, i) => (
              <React.Fragment key={i}>
                {i > 0 && (
                  <span className={`text-[9px] px-1.5 py-0.5 rounded-[4px] font-black leading-none tracking-wider flex-shrink-0 ${getBadgeStyle()}`}>
                    {mode}
                  </span>
                )}
                <span className="truncate">{kw}</span>
              </React.Fragment>
            ))}
          </span>
        );
      };

      const renderCombinedKeywords = (freeW, selectedJobs, mode, colorTheme = 'sky', fallback = '（指定なし）') => {
        const freeWordElem = freeW ? renderSearchConditions(freeW, mode, colorTheme) : null;
        
        if (selectedJobs.length === 0) {
          return freeWordElem || fallback;
        }

        const firstKeywordElem = freeW ? freeWordElem : <span className="truncate">{selectedJobs[0]}</span>;

      const extractYearMonth = (periodStr) => {
        if (!periodStr) return null;
        if (periodStr === '（不明）') return 'unknown';
        const match = periodStr.match(/^(\d{4})(\d{2})\d{2}-/);
        if (match) {
          return `${match[1]}${match[2]}`;
        }
        return null;
      };

      const formatYearMonth = (ym) => {
        if (!ym || ym.length !== 6) return ym;
        return `${ym.slice(0, 4)}年${ym.slice(4, 6)}月`;
      };

      const checkPeriodMatch = (periodStr, from, to, incUnknown) => {
        const ym = extractYearMonth(periodStr);
        if (ym === 'unknown' || !ym) return incUnknown;
        const isAfterFrom = from ? ym >= from : true;
        const isBeforeTo = to ? ym <= to : true;
        return isAfterFrom && isBeforeTo;
      };

      const availableYearMonths = useMemo(() => {

        return Array.from(ymSet).sort();

      const relatedJobTitles = useMemo(() => {

          if (categoryFilter) {

            matchCategory = rowCategory.includes(categoryFilter);
          }

          const matchPeriod = checkPeriodMatch(row['集計期間'], periodFrom, periodTo, includeUnknown);

          return matchFreeWord && matchLocation && matchCampaign && matchCategory && matchPeriod;
        });

        const jobSet = new Set();
        filtered.forEach(row => {
          const stdJob = row['標準化された職種名'] || "";
          if (stdJob) {

      const { filteredData, totals } = useMemo(() => {

          let matchJob = true;
          
          const matchFreeWord = freeWordKeywords.length > 0 ? (

          ) : false;

            if (freeWordKeywords.length > 0) {

          } else {
            if (freeWordKeywords.length > 0 || selectedJobTitles.length > 0) {
              const matchSelectedJobs = selectedJobTitles.some(job => jobName.includes(job));
              matchJob = matchFreeWord || matchSelectedJobs;

          }

          const loc = row['勤務地'] || "";
          const matchLocation = locationKeywords.length === 0 ? true :
            searchMode === 'AND'
              ? locationKeywords.every(kw => loc.includes(kw))
              : locationKeywords.some(kw => loc.includes(kw));

          const campaign = row['キャンペーン'] || "";
          const hasSA = campaign.includes("SA-");
          let matchCampaign = true;
          if (campaignFilter === 'sa-only' && !hasSA) matchCampaign = false;
          if (campaignFilter === 'non-sa-only' && hasSA) matchCampaign = false;

          let matchCategory = true;
          if (categoryFilter) {
            const rowCategory = row['職業カテゴリー'] || "";
            matchCategory = rowCategory.includes(categoryFilter);
          }

          const matchPeriod = checkPeriodMatch(row['集計期間'], periodFrom, periodTo, includeUnknown);

          return matchJob && matchLocation && matchCampaign && matchCategory && matchPeriod;
        });

        const calcTotals = {
          count: filtered.length,

        };

        filtered.forEach(row => {
          calcTotals.cost += (row['消化金額'] || 0);
          calcTotals.impressions += (row['表示回数'] || 0);
          calcTotals.clicks += (row['クリック数'] || 0);
          calcTotals.applyStarts += (row['応募開始数'] || 0);
          calcTotals.applies += (row['応募数'] || 0);
        });

        calcTotals.ctr = calcTotals.impressions > 0 ? (calcTotals.clicks / calcTotals.impressions) * 100 : null;
        calcTotals.applyStartRate = calcTotals.clicks > 0 ? (calcTotals.applyStarts / calcTotals.clicks) * 100 : null;
        calcTotals.cvr = calcTotals.clicks > 0 ? (calcTotals.applies / calcTotals.clicks) * 100 : null;
        calcTotals.cpc = calcTotals.clicks > 0 ? calcTotals.cost / calcTotals.clicks : null;
        calcTotals.cpa = calcTotals.applies > 0 ? calcTotals.cost / calcTotals.applies : null;

        return { filteredData: filtered, totals: calcTotals };
      // ▼ 変更：依存配列を各ステートに戻す
      }, [data, freeWord, location, campaignFilter, categoryFilter, searchMode, selectedJobTitles, periodFrom, periodTo, includeUnknown, comparisonMode]);

      const simulationResults = useMemo(() => {
        // ▼ 変更：appliedFilters ではなく、現在のステートを直接参照
        const targetKeywords = selectedJobTitles.map(job => ({ keyword: job, suffix: '', tokens: splitKeywords(job) }));

        if (targetKeywords.length === 0) return [];

        const locationKeywords = splitKeywords(location);
        
        // 1. 事前フィルタリング (職種名以外)
        const preFiltered = data.filter(row => {
            const loc = row['勤務地'] || "";
            const matchLocation = locationKeywords.length === 0 ? true :
              searchMode === 'AND'
                ? locationKeywords.every(kw => loc.includes(kw))
                : locationKeywords.some(kw => loc.includes(kw));
            if (!matchLocation) return false;

            const campaign = row['キャンペーン'] || "";
            const hasSA = campaign.includes("SA-");

        // 2. 集計箱の準備
        const accumulators = targetKeywords.map(tk => ({
            keyword: tk.keyword,

            impressions: 0,

            applyStarts: 0,

        // 3. 1回のループで振り分け
        preFiltered.forEach(row => {

            const cost = row['消化金額'] || 0;
            const impressions = row['表示回数'] || 0;
            const clicks = row['クリック数'] || 0;
            const applyStarts = row['応募開始数'] || 0;
            const applies = row['応募数'] || 0;

            accumulators.forEach(acc => {
                const matchFreeWord = acc.tokens.length === 0 ? true :
                  searchMode === 'AND'
                    ? acc.tokens.every(kw => jobName.includes(kw))
                    : acc.tokens.some(kw => jobName.includes(kw));
                
                if (matchFreeWord) {
                    acc.count++;
                    acc.cost += cost;
                    acc.impressions += impressions;
                    acc.clicks += clicks;
                    acc.applyStarts += applyStarts;
                    acc.applies += applies;
                }
            });
        });

        // 4. 最終計算
        const results = [];
        accumulators.forEach(acc => {
            if (acc.count > 0) {
                acc.ctr = acc.impressions > 0 ? (acc.clicks / acc.impressions) * 100 : null;
                acc.applyStartRate = acc.clicks > 0 ? (acc.applyStarts / acc.clicks) * 100 : null;
                acc.cvr = acc.clicks > 0 ? (acc.applies / acc.clicks) * 100 : null;
                acc.cpc = acc.clicks > 0 ? acc.cost / acc.clicks : null;
                acc.cpa = acc.applies > 0 ? acc.cost / acc.applies : null;
                results.push(acc);
            }
        });

        return results.sort((a, b) => b.count - a.count);
      // ▼ 変更：依存配列を各ステートに戻す
      }, [data, freeWord, location, campaignFilter, categoryFilter, searchMode, selectedJobTitles, periodFrom, periodTo, includeUnknown]);

      const prefectureResults = useMemo(() => {
        if (comparisonMode !== 'prefecture') return [];

        // ▼ 変更：appliedFilters ではなく、現在のステートを直接参照
        const freeWordKeywords = splitKeywords(freeWord);

        // 1. 事前フィルタリング (勤務地以外)
        const preFiltered = data.filter(row => {
            const jobName = row['職種名'] || "";
            let matchJob = true;
            if (freeWordKeywords.length > 0 || selectedJobTitles.length > 0) {
              const matchFreeWord = freeWordKeywords.length > 0 ? (
                searchMode === 'AND'
                  ? freeWordKeywords.every(kw => jobName.includes(kw))
                  : freeWordKeywords.some(kw => jobName.includes(kw))
              ) : false;
              const matchSelectedJobs = selectedJobTitles.some(job => jobName.includes(job));
              matchJob = matchFreeWord || matchSelectedJobs;
            }
            if (!matchJob) return false;

            const campaign = row['キャンペーン'] || "";
            const hasSA = campaign.includes("SA-");
            if (campaignFilter === 'sa-only' && !hasSA) return false;
            if (campaignFilter === 'non-sa-only' && hasSA) return false;

            if (categoryFilter) {
              const rowCategory = row['職業カテゴリー'] || "";
              if (!rowCategory.includes(categoryFilter)) return false; 
            }

            const matchPeriod = checkPeriodMatch(row['集計期間'], periodFrom, periodTo, includeUnknown);
            if (!matchPeriod) return false;

            return true;
        });

        // 2. 集計箱の準備
        const accumulators = {};
        PREFECTURES.forEach(pref => {
            accumulators[pref] = {
                prefecture: pref,
                count: 0,
                cost: 0,
                impressions: 0,
                clicks: 0,
                applyStarts: 0,
                applies: 0
            };
        });

        // 3. 1回のループで振り分け
        preFiltered.forEach(row => {
            const loc = row['勤務地'] || "";
            if (!loc) return;
            const cost = row['消化金額'] || 0;
            const impressions = row['表示回数'] || 0;
            const clicks = row['クリック数'] || 0;
            const applyStarts = row['応募開始数'] || 0;
            const applies = row['応募数'] || 0;

            PREFECTURES.forEach(pref => {
                if (loc.includes(pref)) {
                    const acc = accumulators[pref];
                    acc.count++;
                    acc.cost += cost;
                    acc.impressions += impressions;
                    acc.clicks += clicks;
                    acc.applyStarts += applyStarts;
                    acc.applies += applies;
                }
            });
        });

        // 4. 最終計算
        const results = [];
        PREFECTURES.forEach(pref => {
            const acc = accumulators[pref];
            if (acc.count > 0) {
                acc.ctr = acc.impressions > 0 ? (acc.clicks / acc.impressions) * 100 : null;
                acc.applyStartRate = acc.clicks > 0 ? (acc.applyStarts / acc.clicks) * 100 : null;
                acc.cvr = acc.clicks > 0 ? (acc.applies / acc.clicks) * 100 : null;
                acc.cpc = acc.clicks > 0 ? acc.cost / acc.clicks : null;
                acc.cpa = acc.applies > 0 ? acc.cost / acc.applies : null;

                if (showOnlyCpa && (acc.cpa === null || acc.cpa < 1)) {
                    // 何もしない
                } else {
                    results.push(acc);
                }
            }
        });

        return results.sort((a, b) => {
          if (a.cpa === null && b.cpa === null) {
            if (a.cpc === null && b.cpc === null) return b.count - a.count;
            if (a.cpc === null) return 1;
            if (b.cpc === null) return -1;
            return a.cpc - b.cpc;
          }
          
          if (a.cpa === null) return 1;
          if (b.cpa === null) return -1;
          return a.cpa - b.cpa;
        });
      // ▼ 変更：依存配列を各ステートに戻す
      }, [data, freeWord, campaignFilter, categoryFilter, searchMode, selectedJobTitles, periodFrom, periodTo, includeUnknown, comparisonMode, showOnlyCpa]);

      const periodResults = useMemo(() => {
        if (comparisonMode !== 'period') return [];

        // ▼ 変更：appliedFilters ではなく、現在のステートを直接参照
        const freeWordKeywords = splitKeywords(freeWord);
        const locationKeywords = splitKeywords(location);

        // 1. 事前フィルタリング (集計期間以外)
        const preFiltered = data.filter(row => {
            const jobName = row['職種名'] || "";
            let matchJob = true;
            if (freeWordKeywords.length > 0 || selectedJobTitles.length > 0) {
              const matchFreeWord = freeWordKeywords.length > 0 ? (
                searchMode === 'AND'

              ) : false;
              const matchSelectedJobs = selectedJobTitles.some(job => jobName.includes(job));
              matchJob = matchFreeWord || matchSelectedJobs;

            const matchLocation = locationKeywords.length === 0 ? true :
              searchMode === 'AND'

            const hasSA = campaign.includes("SA-");
            if (campaignFilter === 'sa-only' && !hasSA) return false;
            if (campaignFilter === 'non-sa-only' && hasSA) return false;

            if (categoryFilter) {
              const rowCategory = row['職業カテゴリー'] || "";
              if (!rowCategory.includes(categoryFilter)) return false; 
            }

            return true;
        });

        const formatLabel = (from, to) => {
          if (!from && !to) return "指定なし (全期間)";
          const f = from ? formatYearMonth(from) : '全期間';
          const t = to ? formatYearMonth(to) : '全期間';
          return `${f} 〜 ${t}`;
        };

        const labelA = formatLabel(comparePeriodAFrom, comparePeriodATo);
        const labelB = formatLabel(comparePeriodBFrom, comparePeriodBTo);

        const accB = { label: `期間 B : ${labelB}`, isDiff: false, count: 0, cost: 0, impressions: 0, clicks: 0, applyStarts: 0, applies: 0 };

        // 3. 1回のループで振り分け
        preFiltered.forEach(row => {

            const clicks = row['クリック数'] || 0;
            const applyStarts = row['応募開始数'] || 0;

                accB.impressions += impressions;
                accB.clicks += clicks;
                accB.applyStarts += applyStarts;
                accB.applies += applies;
            }

        // 4. 率の計算と差分の生成
        [accA, accB].forEach(acc => {
            acc.ctr = acc.impressions > 0 ? (acc.clicks / acc.impressions) * 100 : null;
            acc.applyStartRate = acc.clicks > 0 ? (acc.applyStarts / acc.clicks) * 100 : null;
            acc.cvr = acc.clicks > 0 ? (acc.applies / acc.clicks) * 100 : null;

          cvr: (accB.cvr !== null && accA.cvr !== null) ? accB.cvr - accA.cvr : null,
          cpc: (accB.cpc !== null && accA.cpc !== null) ? accB.cpc - accA.cpc : null,
          cpa: (accB.cpa !== null && accA.cpa !== null) ? accB.cpa - accA.cpa : null,

      }, [data, freeWord, location, campaignFilter, categoryFilter, searchMode, selectedJobTitles, periodFrom, periodTo, includeUnknown, comparisonMode, comparePeriodAFrom, comparePeriodATo, comparePeriodBFrom, comparePeriodBTo]);

      const allStatItems = [

        const headers = ['検索キーワード', '勤務地'];

        tsv += headers.join(separator) + newline;

        const topRowKeyword = (comparisonMode === 'prefecture' || comparisonMode === 'period') ? combinedKeywordsStr : freeWord;
        const mainRow = [topRowKeyword || '（指定なし）', location || '（全国）'];
        
        statItems.forEach(item => {

          if (val !== null && item.unit === '%') {

          }
          mainRow.push(val === null ? '-' : val);
        });
        tsv += mainRow.join(separator) + newline;

        const rows = comparisonMode === 'job' ? simulationResults : comparisonMode === 'prefecture' ? prefectureResults : periodResults;
        rows.forEach(result => {

          document.execCommand('copy');
          setIsCopied(true);
          setTimeout(() => setIsCopied(false), 2000);
        } catch (err) {
          console.error('コピーに失敗しました', err);
          alert('コピーに失敗しました。');
        } finally {
          document.body.removeChild(textarea);
        }

      const totalTableWidth = 200 + 140 + statItems.length * 140;

      // ▼ 削除：表示用の displayXXX 変数を削除し、元のステートを直接使用する形に戻しました

      if (loading) {

            fontFamily: "'Zen Maru Gothic', sans-serif", 
            minHeight: "100vh"

          <div className="min-h-screen p-4 md:p-6 lg:p-8 flex flex-col relative">

            <div className="max-w-[1800px] mx-auto space-y-8 w-full">

                    <label htmlFor="location" className="text-sm font-bold text-stone-600 flex items-center gap-1.5">

                    </label>
                    <div className="relative">
                      <Search size={20} className="absolute left-4 top-1/2 -translate-y-1/2 text-stone-400" />
                      <input
                        id="location"
                        type="text"
                        value={locationInput}
                        onChange={(e) => setLocationInput(e.target.value)}

                  </div>

                        <select

                    </div>
                  </div>

                    <div className="col-span-1 md:col-span-2 lg:col-span-4 pt-5 border-t-4 border-white border-dashed">

                        <Sparkles size={16} className="text-amber-500 drop-shadow-sm" /> 関連する標準化職種 <span className="text-stone-400 font-bold ml-1 text-xs">※クリックして比較表に追加</span>

                                isSelected
                                  ? 'bg-gradient-to-b from-amber-300 to-orange-400 text-white border-orange-200 shadow-[0_4px_0_0_#c2410c] active:shadow-none active:translate-y-[4px] hover:brightness-110'
                                  : 'bg-stone-100 text-stone-500 border-stone-200 shadow-[0_4px_0_0_#d6d3d1] active:shadow-none active:translate-y-[4px] hover:bg-white hover:text-stone-600'
                              }`}
                            >
                              {job}
                            </button>
                          );

                      </div>
                    </div>

                <div className="mt-6 grid grid-cols-1 md:grid-cols-2 gap-6">

                            ? 'bg-gradient-to-b from-sky-400 to-sky-500 text-white font-bold shadow-[0_4px_0_0_#0284c7] -translate-y-[2px]' 
                            : 'bg-white/80 text-stone-500 font-bold shadow-[0_4px_0_0_#d6d3d1] hover:bg-white hover:translate-y-[2px] hover:shadow-[0_2px_0_0_#d6d3d1]'
                        }`}
                      >
                        すべて含む (AND)
                      </button>
                    </div>
                  </div>

                  <div className="bg-stone-100/50 p-5 rounded-[1.5rem] border-4 border-white shadow-[inset_0_4px_8px_rgba(0,0,0,0.05)] flex flex-col sm:flex-row sm:items-center gap-4">
                    <label className="text-sm font-bold text-stone-600 flex items-center gap-1.5 whitespace-nowrap">

                            : 'bg-white/80 text-stone-500 font-bold shadow-[0_4px_0_0_#d6d3d1] hover:bg-white hover:translate-y-[2px] hover:shadow-[0_2px_0_0_#d6d3d1]'
                        }`}
                      >
                        すべて
                      </button>
                      <button
                        onClick={() => setCampaignFilter('sa-only')}

                            ? 'bg-gradient-to-b from-green-400 to-emerald-500 text-white font-bold shadow-[0_4px_0_0_#047857] -translate-y-[2px]'

                            ? 'bg-gradient-to-b from-green-400 to-emerald-500 text-white font-bold shadow-[0_4px_0_0_#047857] -translate-y-[2px]' 
                            : 'bg-white/80 text-stone-500 font-bold shadow-[0_4px_0_0_#d6d3d1] hover:bg-white hover:translate-y-[2px] hover:shadow-[0_2px_0_0_#d6d3d1]'

                    <p>

                    </p>

                </div>
              </div>

              <div className="relative bg-white/90 backdrop-blur-xl rounded-[2rem] shadow-[0_12px_24px_-8px_rgba(0,0,0,0.15)] border-4 border-white flex flex-col mb-10 overflow-clip min-h-[400px]">

                      <div className="flex bg-stone-200/80 p-1.5 rounded-2xl shadow-inner gap-2">

                              : 'bg-white/80 text-stone-500 font-bold shadow-[0_4px_0_0_#d6d3d1] hover:bg-white hover:translate-y-[2px] hover:shadow-[0_2px_0_0_#d6d3d1]'

                              : 'bg-white/80 text-stone-500 font-bold shadow-[0_4px_0_0_#d6d3d1] hover:bg-white hover:translate-y-[2px] hover:shadow-[0_2px_0_0_#d6d3d1]'

                        </button>
                        <button
                          onClick={() => setComparisonMode('period')}
                          className={`px-5 py-2 text-xs rounded-xl transition-all ${
                            comparisonMode === 'period'

                              : 'bg-white/80 text-stone-500 font-bold shadow-[0_4px_0_0_#d6d3d1] hover:bg-white hover:translate-y-[2px] hover:shadow-[0_2px_0_0_#d6d3d1]'
                          }`}
                        >

                        </button>
                      </div>
                    </div>
                    
                    <div className="flex flex-col sm:flex-row items-start sm:items-center gap-4 lg:justify-end w-full lg:w-auto">
                      
                      <div className="flex flex-wrap items-center gap-2 text-xs">

                              {periodTo ? formatYearMonth(periodTo) : ''}

                              </button>
                              <button 
                                onClick={() => setVisibleColumns(['count', 'cost', 'clicks', 'applies', 'cvr', 'cpc', 'cpa'])}
                                className="px-2 py-2.5 text-[10px] font-bold bg-stone-50 border-2 border-stone-200 rounded-xl text-stone-600 hover:bg-white shadow-[0_3px_0_0_#d6d3d1] active:shadow-none active:translate-y-[3px]"
                              >
                                標準
                              </button>
                              <button 
                                onClick={() => setVisibleColumns(allStatItems.map(i => i.id))}
                                className="px-2 py-2.5 text-[10px] font-bold bg-stone-50 border-2 border-stone-200 rounded-xl text-stone-600 hover:bg-white shadow-[0_3px_0_0_#d6d3d1] active:shadow-none active:translate-y-[3px]"
                              >
                                すべて
                              </button>
                            </div>
                            <div className="max-h-64 overflow-y-auto custom-scrollbar flex flex-col gap-1.5 pr-2">
                              {allStatItems.map((item) => {
                                const isChecked = visibleColumns.includes(item.id);
                                return (
                                  <label 
                                    key={`col-toggle-${item.id}`} 
                                    className="flex items-center gap-3 p-2.5 hover:bg-purple-50 rounded-xl cursor-pointer transition-colors border-2 border-transparent hover:border-purple-100"
                                  >
                                    <input 
                                      type="checkbox" 
                                      className="sr-only" 
                                      checked={isChecked} 
                                      onChange={() => toggleColumn(item.id)} 
                                    />
                                    <div className={`w-6 h-6 rounded-lg border-2 flex items-center justify-center flex-shrink-0 transition-colors shadow-inner ${isChecked ? 'bg-gradient-to-b from-purple-400 to-fuchsia-500 border-none' : 'border-stone-300 bg-stone-100'}`}>
                                      {isChecked && <Check size={16} className="text-white drop-shadow-sm" />}
                                    </div>
                                    <div className="flex items-center gap-2 text-stone-700">
                                      <span className="text-stone-400">{item.icon}</span>
                                      <span className="font-bold text-sm">{item.title}</span>
                                    </div>
                                  </label>
                                );
                              })}
                            </div>
                          </div>
                        )}
                      </div>

                      <div className="hidden sm:block w-1 h-8 bg-stone-200 rounded-full mx-2"></div>

                      <div className="flex items-center gap-3">
                        <button
                          onClick={handleCopyTable}
                          className={`flex items-center gap-2 px-5 py-2.5 rounded-xl border-2 transition-all font-bold text-sm text-white ${
                            isCopied 
                              ? 'bg-gradient-to-b from-teal-400 to-teal-500 border-teal-400 shadow-none translate-y-[4px]' 
                              : 'bg-gradient-to-b from-emerald-400 to-teal-500 border-emerald-300 shadow-[0_4px_0_0_#0f766e] active:shadow-none active:translate-y-[4px] hover:brightness-110'
                          }`}
                        >
                          {isCopied ? <Check size={18} className="text-white" /> : <Copy size={18} className="text-emerald-100" />}
                          {isCopied ? 'コピーしました！' : '表をコピー'}
                        </button>
                      </div>

                    </div>
                  </div>

                  {comparisonMode === 'period' && (
                    <div className="bg-indigo-50/80 px-6 py-4 border-t-4 border-white flex flex-col md:flex-row items-start md:items-center gap-6">
                      <div className="flex items-center gap-3 w-full md:w-auto">
                        <span className="font-bold text-indigo-700 text-sm bg-white px-3 py-2 rounded-xl shadow-[inset_0_2px_4px_rgba(0,0,0,0.05)] border-2 border-indigo-100 flex-shrink-0">期間 A</span>
                        <select
                          value={comparePeriodAFrom}
                          onChange={(e) => setComparePeriodAFrom(e.target.value)}
                          className="w-full pl-3 pr-8 py-2 bg-white border-2 border-indigo-100 rounded-xl focus:outline-none focus:border-indigo-300 transition-all font-bold text-stone-700 shadow-sm appearance-none cursor-pointer text-sm"
                        >
                          <option value="">開始月</option>
                          {availableYearMonths.map(ym => <option key={`fromA-${ym}`} value={ym}>{formatYearMonth(ym)}</option>)}
                        </select>
                        <span className="text-stone-400 font-bold">〜</span>
                        <select
                          value={comparePeriodATo}
                          onChange={(e) => setComparePeriodATo(e.target.value)}
                          className="w-full pl-3 pr-8 py-2 bg-white border-2 border-indigo-100 rounded-xl focus:outline-none focus:border-indigo-300 transition-all font-bold text-stone-700 shadow-sm appearance-none cursor-pointer text-sm"
                        >
                          <option value="">終了月</option>
                          {availableYearMonths.map(ym => <option key={`toA-${ym}`} value={ym}>{formatYearMonth(ym)}</option>)}
                        </select>
                      </div>
                      <div className="flex items-center gap-3 w-full md:w-auto">
                        <span className="font-bold text-rose-700 text-sm bg-white px-3 py-2 rounded-xl shadow-[inset_0_2px_4px_rgba(0,0,0,0.05)] border-2 border-rose-100 flex-shrink-0">期間 B</span>
                        <select
                          value={comparePeriodBFrom}
                          onChange={(e) => setComparePeriodBFrom(e.target.value)}
                          className="w-full pl-3 pr-8 py-2 bg-white border-2 border-rose-100 rounded-xl focus:outline-none focus:border-rose-300 transition-all font-bold text-stone-700 shadow-sm appearance-none cursor-pointer text-sm"
                        >
                          <option value="">開始月</option>
                          {availableYearMonths.map(ym => <option key={`fromB-${ym}`} value={ym}>{formatYearMonth(ym)}</option>)}
                        </select>
                        <span className="text-stone-400 font-bold">〜</span>
                        <select
                          value={comparePeriodBTo}
                          onChange={(e) => setComparePeriodBTo(e.target.value)}
                          className="w-full pl-3 pr-8 py-2 bg-white border-2 border-rose-100 rounded-xl focus:outline-none focus:border-rose-300 transition-all font-bold text-stone-700 shadow-sm appearance-none cursor-pointer text-sm"
                        >
                          <option value="">終了月</option>
                          {availableYearMonths.map(ym => <option key={`toB-${ym}`} value={ym}>{formatYearMonth(ym)}</option>)}
                        </select>
                      </div>
                      <div className="text-xs font-bold text-stone-500 flex items-center gap-1 bg-white px-3 py-2 rounded-xl border-2 border-stone-100">
                        <AlertCircle size={16} className="text-indigo-400" /> ※(不明)データは比較から除外されます
                      </div>
                    </div>
                  )}

                  <div 
                    className={`overflow-x-auto overflow-y-hidden w-full bg-white custom-scrollbar-hide transition-opacity duration-200 ${isCalculating ? 'opacity-40 pointer-events-none' : ''}`} 
                    ref={headerScrollRef}
                    onScroll={handleScroll}
                  >
                    <table className="w-max min-w-full text-left border-collapse table-fixed">
                      <thead>
                        <tr className="bg-gradient-to-r from-stone-100 to-stone-50">
                          <th className={`sticky left-0 z-30 py-2 px-3 text-xs font-bold text-stone-500 bg-stone-100 table-cell-border`} style={KEYWORD_STYLE}>
                            <div className={comparisonMode === 'prefecture' ? 'truncate' : ''} title="検索キーワード">
                              検索キーワード
                            </div>
                          </th>
                          <th className="sticky left-[200px] z-30 py-2 px-3 text-xs font-bold text-stone-500 bg-stone-50 table-cell-border" style={PREF_STYLE}>
                            <div className="flex items-center gap-1.5">
                              <MapPin size={14} className="text-stone-400" />
                              <span>勤務地</span>
                            </div>
                          </th>
                          {statItems.map((item) => (
                            <th key={`head-${item.id}`} className="py-2 px-3 text-xs font-bold text-stone-500 bg-stone-50 table-cell-border" style={STAT_STYLE}>
                              <div className="flex items-center justify-end gap-1.5">
                                {React.cloneElement(item.icon, { size: 14 })}
                                <span className="truncate" title={item.title}>{item.title}</span>
                              </div>
                            </th>
                          ))}
                        </tr>
                        
                        <tr className="bg-gradient-to-r from-sky-100 to-blue-50">
                          <td 
                            className={`sticky left-0 z-30 py-2 px-3 font-bold text-sm text-sky-900 bg-sky-100 table-cell-border-sky ${
                              comparisonMode === 'prefecture' || comparisonMode === 'period' ? 'truncate' : 'whitespace-nowrap'
                            }`}
                            style={KEYWORD_STYLE}
                            title={
                              comparisonMode === 'prefecture' || comparisonMode === 'period'
                                ? [freeWord, ...selectedJobTitles].filter(Boolean).join(' OR ') || '（指定なし）'
                                : freeWord || '（指定なし）'
                            }
                          >
                            {comparisonMode === 'prefecture' || comparisonMode === 'period'
                              ? renderCombinedKeywords(freeWord, selectedJobTitles, searchMode, 'sky')
                              : renderSearchConditions(freeWord, searchMode, 'sky', '（指定なし）')
                            }
                          </td>
                          <td 
                            className="sticky left-[200px] z-30 py-2 px-3 font-bold text-sm text-sky-900 bg-sky-50 table-cell-border-sky whitespace-nowrap" 
                            style={PREF_STYLE}
                            title={location || '（全国）'}
                          >
                            {renderSearchConditions(location, searchMode, 'sky', '（全国）')}
                          </td>
                          {statItems.map((item) => {
                            const isNull = item.value === null;
                            const formattedValue = isNull 
                              ? '-' 
                              : (typeof item.value === 'number' 
                                  ? item.value.toLocaleString('ja-JP', { minimumFractionDigits: item.decimalPlaces, maximumFractionDigits: item.decimalPlaces }) 
                                  : item.value);
                              
                            return (
                              <td key={`main-${item.id}`} className="py-2 px-3 bg-sky-50 table-cell-border-sky" style={STAT_STYLE}>
                                <div className="flex items-baseline justify-end gap-1">
                                  <span className="text-sm font-bold text-sky-900 tracking-tight drop-shadow-sm leading-none">
                                    {formattedValue}
                                  </span>
                                  {!isNull && (
                                    <span className="text-[10px] font-bold text-sky-600/80 leading-none ml-0.5">
                                      {item.unit}
                                    </span>
                                  )}
                                </div>
                              </td>
                            );
                          })}
                        </tr>
                      </thead>
                    </table>
                  </div>
                </div>

                <div 
                  className={`overflow-x-auto overflow-y-visible w-full custom-scrollbar-hide bg-white rounded-b-[2rem] transition-opacity duration-200 ${isCalculating ? 'opacity-40 pointer-events-none' : ''}`}
                  ref={bodyScrollRef}
                  onScroll={handleScroll}
                >
                  <table className="w-max min-w-full text-left border-collapse table-fixed">
                    <tbody>
                      {comparisonMode === 'job' && simulationResults.length > 0 && (
                        <>
                          {simulationResults.map((result, idx) => (
                            <tr key={`sim-${idx}`} className="group bg-white hover:bg-orange-50 transition-colors">
                              <td className="sticky left-0 z-10 py-1 px-3 text-sm font-bold text-stone-700 bg-stone-50 group-hover:bg-orange-100 transition-colors whitespace-nowrap truncate table-cell-border leading-tight" style={KEYWORD_STYLE} title={result.keyword + (result.suffix || '')}>
                                {result.keyword}
                                {result.suffix && (
                                  <span className="text-stone-400 font-bold text-xs ml-1">{result.suffix}</span>
                                )}
                              </td>
                              <td className="sticky left-[200px] z-10 py-1 px-3 text-sm font-bold text-stone-700 bg-stone-50 group-hover:bg-orange-100 transition-colors whitespace-nowrap truncate table-cell-border leading-tight" style={PREF_STYLE} title={location || '（全国）'}>
                                {renderSearchConditions(location, searchMode, 'stone', '（全国）')}
                              </td>
                              {statItems.map((item) => {
                                const val = result[item.id];
                                const isNull = val === null;
                                const formattedValue = isNull 
                                  ? '-' 
                                  : (typeof val === 'number' 
                                      ? val.toLocaleString('ja-JP', { minimumFractionDigits: item.decimalPlaces, maximumFractionDigits: item.decimalPlaces }) 
                                      : val);
                                  
                                return (
                                  <td key={`sim-cell-${idx}-${item.id}`} className="py-1 px-3 table-cell-border" style={STAT_STYLE}>
                                    <div className="flex items-baseline justify-end gap-1">
                                      <span className="text-sm font-bold text-stone-700 tracking-tight leading-none">
                                        {formattedValue}
                                      </span>
                                      {!isNull && (
                                        <span className="text-[10px] font-bold text-stone-400 ml-0.5 leading-none">
                                          {item.unit}
                                        </span>
                                      )}
                                    </div>
                                  </td>
                                );
                              })}
                            </tr>
                          ))}
                        </>
                      )}

                      {comparisonMode === 'prefecture' && prefectureResults.length > 0 && (
                        <>
                          {prefectureResults.map((result, idx) => {
                            const shortPref = result.prefecture === '北海道' ? '北海道' : result.prefecture.replace(/[都府県]$/, '');
                            
                            let isHighlighted = false;
                            if (location) {
                              if (result.prefecture === '京都府') {
                                const locWithoutTokyo = location.replace(/東京都?/g, '');
                                isHighlighted = locWithoutTokyo.includes('京都');
                              } else {
                                isHighlighted = location.includes(shortPref);
                              }
                            }
                            
                            const rowBg = isHighlighted ? 'bg-emerald-50 hover:bg-emerald-100' : 'bg-white hover:bg-orange-50';
                            const stickyBg = isHighlighted ? 'bg-emerald-100 group-hover:bg-emerald-200' : 'bg-stone-50 group-hover:bg-orange-100';
                            
                            const cellBorderClass = isHighlighted ? 'table-cell-border-emerald' : 'table-cell-border';

                            return (
                              <tr key={`pref-${idx}`} className={`group transition-colors ${rowBg}`}>
                                <td 
                                  className={`sticky left-0 z-10 py-1 px-3 text-sm font-bold transition-colors truncate leading-tight ${isHighlighted ? 'text-emerald-900' : 'text-stone-700'} ${stickyBg} ${cellBorderClass}`}
                                  style={KEYWORD_STYLE}
                                  title={[freeWord, ...selectedJobTitles].filter(Boolean).join(' OR ') || '（指定なし）'}
                                >
                                  {renderCombinedKeywords(freeWord, selectedJobTitles, searchMode, isHighlighted ? 'emerald' : 'stone')}
                                </td>
                                <td className={`sticky left-[200px] z-10 py-1 px-3 text-sm font-bold whitespace-nowrap transition-colors leading-tight ${isHighlighted ? 'text-emerald-900' : 'text-stone-700'} ${stickyBg} ${cellBorderClass}`} style={PREF_STYLE}>
                                  <div className="flex items-center gap-2">
                                    <div className={`flex items-center justify-center w-5 h-5 rounded-full text-[10px] font-extrabold flex-shrink-0 ${
                                      idx === 0 ? 'bg-gradient-to-b from-yellow-400 to-amber-500 text-white shadow-[0_2px_0_0_#b45309]' :
                                      idx === 1 ? 'bg-gradient-to-b from-slate-300 to-slate-400 text-white shadow-[0_2px_0_0_#64748b]' :
                                      idx === 2 ? 'bg-gradient-to-b from-orange-400 to-rose-400 text-white shadow-[0_2px_0_0_#be123c]' :
                                      'bg-stone-200 text-stone-500 shadow-[inset_0_2px_4px_rgba(0,0,0,0.1)]'
                                    }`}>
                                      {idx + 1}
                                    </div>
                                    <span className="truncate" title={result.prefecture}>{result.prefecture}</span>
                                  </div>
                                </td>
                                {statItems.map((item) => {
                                  const val = result[item.id];
                                  const isNull = val === null;
                                  const formattedValue = isNull
                                    ? '-' 
                                    : (typeof val === 'number' 
                                        ? val.toLocaleString('ja-JP', { minimumFractionDigits: item.decimalPlaces, maximumFractionDigits: item.decimalPlaces }) 
                                        : val);
                                    
                                  return (
                                    <td key={`pref-cell-${idx}-${item.id}`} className={`py-1 px-3 ${cellBorderClass}`} style={STAT_STYLE}>
                                      <div className="flex items-baseline justify-end gap-1">
                                        <span className="text-sm font-bold text-stone-700 tracking-tight leading-none">
                                          {formattedValue}
                                        </span>
                                        {!isNull && (
                                          <span className="text-[10px] font-bold text-stone-400 ml-0.5 leading-none">
                                            {item.unit}
                                          </span>
                                        )}
                                      </div>
                                    </td>
                                  );
                                })}
                              </tr>
                            );
                          })}
                        </>
                      )}

                      {comparisonMode === 'period' && periodResults.length > 0 && (
                        <>
                          {periodResults.map((result, idx) => {
                            const isDiff = result.isDiff;
                            const rowBg = isDiff ? 'bg-indigo-50 hover:bg-indigo-100/70' : 'bg-white hover:bg-orange-50';
                            const stickyBg = isDiff ? 'bg-indigo-100 group-hover:bg-indigo-200/70' : 'bg-stone-50 group-hover:bg-orange-100';
                            const cellBorderClass = 'table-cell-border';

                            return (
                              <tr key={`period-${idx}`} className={`group transition-colors ${rowBg}`}>
                                <td 
                                  className={`sticky left-0 z-10 py-1 px-3 text-sm font-bold transition-colors truncate leading-tight ${isDiff ? 'text-indigo-900' : 'text-stone-700'} ${stickyBg} ${cellBorderClass}`}
                                  style={KEYWORD_STYLE}
                                  title={result.label}
                                >
                                  {result.label}
                                </td>
                                <td className={`sticky left-[200px] z-10 py-1 px-3 text-sm font-bold whitespace-nowrap transition-colors leading-tight ${isDiff ? 'text-indigo-900' : 'text-stone-700'} ${stickyBg} ${cellBorderClass}`} style={PREF_STYLE}>
                                  {renderSearchConditions(location, searchMode, isDiff ? 'sky' : 'stone', '（全国）')}
                                </td>
                                {statItems.map((item) => {
                                  const val = result[item.id];
                                  const isNull = val === null;
                                  let formattedValue = '-';
                                  let displayUnit = item.unit;
                                  let signColor = '';
                                  
                                  if (!isNull) {
                                    if (isDiff) {
                                      const sign = val > 0 ? '+' : '';
                                      formattedValue = sign + val.toLocaleString('ja-JP', { minimumFractionDigits: item.decimalPlaces, maximumFractionDigits: item.decimalPlaces });
                                      if (item.unit === '%') displayUnit = 'pt';
                                      if (val > 0) signColor = 'text-rose-600';
                                      else if (val < 0) signColor = 'text-blue-600';
                                    } else {
                                      formattedValue = val.toLocaleString('ja-JP', { minimumFractionDigits: item.decimalPlaces, maximumFractionDigits: item.decimalPlaces });
                                    }
                                  }
                                    
                                  return (
                                    <td key={`period-cell-${idx}-${item.id}`} className={`py-1 px-3 ${cellBorderClass}`} style={STAT_STYLE}>
                                      <div className="flex items-baseline justify-end gap-1">
                                        <span className={`text-sm font-bold tracking-tight leading-none ${signColor || 'text-stone-700'}`}>
                                          {formattedValue}
                                        </span>
                                        {!isNull && (
                                          <span className="text-[10px] font-bold text-stone-400 ml-0.5 leading-none">
                                            {displayUnit}
                                          </span>
                                        )}
                                      </div>
                                    </td>
                                  );
                                })}
                              </tr>
                            );
                          })}
                        </>
                      )}
                    </tbody>
                  </table>
                </div>
                
                <div 
                  className="sticky bottom-0 z-[70] w-full overflow-x-auto custom-scrollbar bg-stone-100/90 backdrop-blur-sm border-t-4 border-white rounded-b-[2rem]"
                  ref={dummyScrollRef}
                  onScroll={handleScroll}
                >
                  <div style={{ width: `${totalTableWidth}px`, height: '1px' }}></div>
                </div>

              </div>
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
